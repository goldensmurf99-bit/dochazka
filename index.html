<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dochádzka">
<meta name="theme-color" content="#007AFF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Dochádzka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --blue: #007AFF;
    --green: #34C759;
    --red: #FF3B30;
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --text: #000000;
    --text2: #3C3C43;
    --text3: #8E8E93;
    --sep: #C6C6C8;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1C1E;
      --card: #2C2C2E;
      --text: #FFFFFF;
      --text2: #EBEBF5;
      --text3: #8E8E93;
      --sep: #38383A;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* NAV BAR */
  .navbar {
    background: var(--card);
    border-bottom: 0.5px solid var(--sep);
    padding-top: calc(var(--safe-top) + 12px);
    padding-bottom: 12px;
    padding-inline: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .navbar h1 { font-size: 17px; font-weight: 600; }
  .navbar button {
    background: none; border: none; color: var(--blue);
    font-size: 17px; cursor: pointer; padding: 4px 8px;
    border-radius: 8px;
  }
  .navbar button:active { opacity: 0.5; }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* TAB BAR */
  .tabbar {
    background: var(--card);
    border-top: 0.5px solid var(--sep);
    padding-bottom: calc(var(--safe-bottom) + 4px);
    padding-top: 8px;
    display: flex;
    flex-shrink: 0;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 10px; padding: 4px;
  }
  .tab svg { width: 24px; height: 24px; }
  .tab.active { color: var(--blue); }

  /* PAGE */
  .page { display: none; height: 100%; }
  .page.active { display: block; }

  /* LIST */
  .list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .section-header {
    display: flex; justify-content: space-between;
    padding: 0 4px 6px;
    font-size: 13px; color: var(--text3); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .section-header span:last-child { color: var(--blue); font-weight: 600; }

  .card {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
  }

  .entry-row {
    display: flex; align-items: center;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--sep);
    cursor: pointer;
    transition: background 0.1s;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-row:active { background: var(--bg); }

  .entry-info { flex: 1; }
  .entry-date { font-size: 15px; font-weight: 500; }
  .entry-note { font-size: 13px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .entry-hours { font-size: 15px; font-weight: 600; color: var(--blue); }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px;
    padding: 80px 32px;
    color: var(--text3); text-align: center;
  }
  .empty-state svg { width: 60px; height: 60px; opacity: 0.4; }
  .empty-state p:first-of-type { font-size: 17px; font-weight: 500; }
  .empty-state p:last-of-type { font-size: 14px; }

  /* STAT CARDS */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card {
    background: var(--card); border-radius: 12px;
    padding: 14px; display: flex; flex-direction: column; gap: 6px;
  }
  .stat-label { font-size: 12px; color: var(--text3); }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.blue { color: var(--blue); }
  .stat-value.green { color: var(--green); }
  .stat-unit { font-size: 13px; color: var(--text3); margin-left: 2px; }

  .month-row {
    display: flex; align-items: center;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--sep);
  }
  .month-row:last-child { border-bottom: none; }
  .month-info { flex: 1; }
  .month-name { font-size: 15px; font-weight: 500; }
  .month-days { font-size: 13px; color: var(--text3); }
  .month-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .month-hours { font-size: 15px; font-weight: 600; color: var(--blue); }
  .export-btn {
    font-size: 12px; color: var(--blue);
    background: none; border: none; cursor: pointer;
    padding: 2px 8px; border-radius: 6px;
    background: rgba(0,122,255,0.1);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg);
    border-radius: 16px 16px 0 0;
    width: 100%;
    padding-bottom: calc(var(--safe-bottom) + 16px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 90dvh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 8px;
  }
  .modal-header h2 { font-size: 17px; font-weight: 600; }
  .modal-header button {
    background: none; border: none; color: var(--blue);
    font-size: 17px; cursor: pointer; font-weight: 600;
  }

  .form-section { padding: 8px 16px 4px; }
  .form-label { font-size: 13px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .form-card { background: var(--card); border-radius: 12px; overflow: hidden; }

  .form-row {
    display: flex; align-items: center;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--sep);
    gap: 12px;
  }
  .form-row:last-child { border-bottom: none; }
  .form-row label { font-size: 15px; flex-shrink: 0; min-width: 80px; }

  input[type="date"], input[type="number"], input[type="text"], textarea, select {
    flex: 1; border: none; background: transparent; outline: none;
    font-size: 15px; color: var(--text); text-align: right;
    font-family: inherit;
  }
  input[type="number"] { max-width: 60px; }
  textarea { text-align: left; resize: none; min-height: 60px; padding-top: 2px; }

  .picker-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; justify-content: center;
  }
  .time-picker {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .time-picker label { font-size: 12px; color: var(--text3); }
  .time-display {
    font-size: 48px; font-weight: 300; color: var(--text);
    display: flex; align-items: center; gap: 4px;
    padding: 8px 16px;
    justify-content: center;
  }
  .time-sep { font-size: 48px; font-weight: 300; margin-bottom: 6px; }

  .stepper {
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
  }
  .stepper button {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: var(--blue); color: white;
    font-size: 22px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    font-weight: 300;
  }
  .stepper button:active { opacity: 0.7; }
  .stepper span {
    font-size: 28px; font-weight: 600; min-width: 60px;
    text-align: center; padding: 4px 0;
  }

  .save-btn {
    margin: 16px; width: calc(100% - 32px);
    padding: 16px; border-radius: 12px;
    background: var(--blue); color: white;
    border: none; font-size: 17px; font-weight: 600;
    cursor: pointer;
  }
  .save-btn:active { opacity: 0.8; }
  .save-btn:disabled { background: var(--text3); }

  /* DELETE BUTTON */
  .delete-btn {
    margin: 0 16px 8px; width: calc(100% - 32px);
    padding: 16px; border-radius: 12px;
    background: rgba(255,59,48,0.1); color: var(--red);
    border: none; font-size: 17px; font-weight: 500;
    cursor: pointer;
  }

  /* EXPORT MODAL */
  .export-list { padding: 0 16px 16px; }
  .export-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--card); border-radius: 12px;
    margin-bottom: 8px; cursor: pointer;
    border: none; width: 100%; text-align: left;
    color: var(--text); font-size: 15px;
  }
  .export-row:active { opacity: 0.7; }
  .export-row svg { color: var(--blue); flex-shrink: 0; }

  .handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--sep); margin: 8px auto 0;
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <span style="width:60px"></span>
  <h1 id="navTitle">Záznamy</h1>
  <button id="addBtn" onclick="openAddModal()">+ Pridať</button>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- PAGE 1: Záznamy -->
  <div class="page active" id="page-records">
    <div id="recordsList"></div>
  </div>

  <!-- PAGE 2: Štatistiky -->
  <div class="page" id="page-stats">
    <div class="list" id="statsList"></div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tab active" onclick="switchTab(0)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    Záznamy
  </button>
  <button class="tab" onclick="switchTab(1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 20V10M12 20V4M6 20v-6"/>
    </svg>
    Štatistiky
  </button>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="entryModal">
  <div class="modal">
    <div class="handle"></div>
    <div class="modal-header">
      <button onclick="closeModal('entryModal')">Zrušiť</button>
      <h2 id="modalTitle">Nový záznam</h2>
      <button onclick="saveEntry()" id="saveBtn">Pridať</button>
    </div>

    <div class="form-section">
      <div class="form-label">Dátum</div>
      <div class="form-card">
        <div class="form-row">
          <label>Dátum</label>
          <input type="date" id="entryDate">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-label">Odpracovaný čas</div>
      <div class="form-card">
        <div style="padding: 16px;">
          <div class="time-display">
            <div>
              <div class="stepper">
                <button onclick="changeHours(1)">+</button>
                <span id="dispHours">8</span>
                <button onclick="changeHours(-1)">−</button>
              </div>
            </div>
            <div class="time-sep">:</div>
            <div>
              <div class="stepper">
                <button onclick="changeMinutes(1)">+</button>
                <span id="dispMinutes">00</span>
                <button onclick="changeMinutes(-1)">−</button>
              </div>
            </div>
          </div>
          <div style="text-align:center; font-size:13px; color:var(--text3); margin-top:4px;">hodiny : minúty (po 15)</div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-label">Poznámka</div>
      <div class="form-card">
        <div class="form-row">
          <textarea id="entryNote" placeholder="napr. projekt, klient..." rows="3"></textarea>
        </div>
      </div>
    </div>

    <button class="save-btn" onclick="saveEntry()" id="saveBtnBottom">Pridať záznam</button>
    <button class="delete-btn" id="deleteBtn" onclick="deleteEntry()" style="display:none">Vymazať záznam</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="handle"></div>
    <div class="modal-header">
      <button onclick="closeModal('exportModal')">Zavrieť</button>
      <h2 id="exportTitle">Export</h2>
      <span style="width:60px"></span>
    </div>
    <div class="export-list" id="exportContent"></div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('dochadzka_entries') || '[]');
entries.forEach(e => e.date = new Date(e.date));

function save() {
  localStorage.setItem('dochadzka_entries', JSON.stringify(entries));
}

// ─── UTILS ──────────────────────────────────────────────────────────────────
const skMonths = ['január','február','marec','apríl','máj','jún','júl','august','september','október','november','december'];
const skMonthsGen = ['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];

function fmtDate(d) {
  const dt = new Date(d);
  return `${dt.getDate()}. ${skMonthsGen[dt.getMonth()]} ${dt.getFullYear()}`;
}

function fmtHours(h) {
  const hrs = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  if (mins === 0) return `${hrs} hod`;
  return `${hrs} hod ${mins} min`;
}

function monthKey(d) {
  const dt = new Date(d);
  return `${skMonths[dt.getMonth()].charAt(0).toUpperCase() + skMonths[dt.getMonth()].slice(1)} ${dt.getFullYear()}`;
}

function monthSortKey(d) {
  const dt = new Date(d);
  return dt.getFullYear() * 100 + dt.getMonth();
}

function isSameWeek(d) {
  const now = new Date();
  const dt = new Date(d);
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay() + 1);
  startOfWeek.setHours(0,0,0,0);
  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate() + 6);
  endOfWeek.setHours(23,59,59,999);
  return dt >= startOfWeek && dt <= endOfWeek;
}

function isSameMonth(d) {
  const now = new Date();
  const dt = new Date(d);
  return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear();
}

function groupByMonth(arr) {
  const map = {};
  arr.forEach(e => {
    const k = monthKey(e.date);
    const sk = monthSortKey(e.date);
    if (!map[k]) map[k] = { label: k, sort: sk, items: [] };
    map[k].items.push(e);
  });
  return Object.values(map).sort((a,b) => b.sort - a.sort);
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── TABS ────────────────────────────────────────────────────────────────────
const tabTitles = ['Záznamy', 'Štatistiky'];
const addBtnEl = document.getElementById('addBtn');

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('active', i===j));
  document.getElementById('navTitle').textContent = tabTitles[i];
  addBtnEl.style.display = i === 0 ? '' : 'none';
  if (i === 1) renderStats();
}

// ─── RECORDS ─────────────────────────────────────────────────────────────────
function renderRecords() {
  const el = document.getElementById('recordsList');
  const sorted = [...entries].sort((a,b) => new Date(b.date) - new Date(a.date));

  if (sorted.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2M12 11v4M10 13h4"/>
      </svg>
      <p>Žiadne záznamy</p>
      <p>Pridaj prvý pracovný deň tlačidlom vyššie</p>
    </div>`;
    return;
  }

  const groups = groupByMonth(sorted);
  let html = '<div class="list">';
  groups.forEach(g => {
    const total = g.items.reduce((s,e) => s + e.hours, 0);
    html += `<div>
      <div class="section-header">
        <span>${g.label}</span>
        <span>${fmtHours(total)}</span>
      </div>
      <div class="card">`;
    g.items.sort((a,b) => new Date(b.date)-new Date(a.date)).forEach(e => {
      html += `<div class="entry-row" onclick="openEditModal('${e.id}')">
        <div class="entry-info">
          <div class="entry-date">${fmtDate(e.date)}</div>
          ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
        </div>
        <div class="entry-hours">${fmtHours(e.hours)}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function renderStats() {
  const weekTotal = entries.filter(e => isSameWeek(e.date)).reduce((s,e) => s+e.hours, 0);
  const monthTotal = entries.filter(e => isSameMonth(e.date)).reduce((s,e) => s+e.hours, 0);
  const groups = groupByMonth([...entries].sort((a,b) => new Date(b.date)-new Date(a.date)));

  let html = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Tento týždeň</div>
        <div><span class="stat-value blue">${weekTotal.toFixed(1)}</span><span class="stat-unit">hod</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tento mesiac</div>
        <div><span class="stat-value green">${monthTotal.toFixed(1)}</span><span class="stat-unit">hod</span></div>
      </div>
    </div>`;

  if (groups.length > 0) {
    html += `<div style="margin-top:12px">
      <div class="section-header" style="padding:0 4px 6px"><span>Prehľad po mesiacoch</span></div>
      <div class="card">`;
    groups.forEach(g => {
      const total = g.items.reduce((s,e) => s+e.hours, 0);
      html += `<div class="month-row">
        <div class="month-info">
          <div class="month-name">${g.label}</div>
          <div class="month-days">${g.items.length} ${g.items.length === 1 ? 'deň' : g.items.length < 5 ? 'dni' : 'dní'}</div>
        </div>
        <div class="month-right">
          <div class="month-hours">${fmtHours(total)}</div>
          <button class="export-btn" onclick="openExport('${g.label}')">↑ Export</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('statsList').innerHTML = html;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
let editingId = null;
let modalHours = 8;
let modalMinutes = 0;

function openAddModal() {
  editingId = null;
  modalHours = 8; modalMinutes = 0;
  document.getElementById('entryDate').value = todayISO();
  document.getElementById('entryNote').value = '';
  document.getElementById('modalTitle').textContent = 'Nový záznam';
  document.getElementById('saveBtn').textContent = 'Pridať';
  document.getElementById('saveBtnBottom').textContent = 'Pridať záznam';
  document.getElementById('deleteBtn').style.display = 'none';
  updateTimeDisplay();
  openModal('entryModal');
}

function openEditModal(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  modalHours = Math.floor(e.hours);
  modalMinutes = Math.round((e.hours - modalHours) * 60);
  const d = new Date(e.date);
  document.getElementById('entryDate').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('entryNote').value = e.note || '';
  document.getElementById('modalTitle').textContent = 'Upraviť záznam';
  document.getElementById('saveBtn').textContent = 'Uložiť';
  document.getElementById('saveBtnBottom').textContent = 'Uložiť zmeny';
  document.getElementById('deleteBtn').style.display = '';
  updateTimeDisplay();
  openModal('entryModal');
}

function changeHours(d) {
  modalHours = Math.max(0, Math.min(24, modalHours + d));
  updateTimeDisplay();
}

function changeMinutes(d) {
  const opts = [0, 15, 30, 45];
  const idx = opts.indexOf(modalMinutes);
  const newIdx = Math.max(0, Math.min(3, idx + d));
  modalMinutes = opts[newIdx];
  updateTimeDisplay();
}

function updateTimeDisplay() {
  document.getElementById('dispHours').textContent = String(modalHours).padStart(2,'0');
  document.getElementById('dispMinutes').textContent = String(modalMinutes).padStart(2,'0');
}

function saveEntry() {
  const dateVal = document.getElementById('entryDate').value;
  if (!dateVal) return;
  const hours = modalHours + modalMinutes / 60;
  if (hours === 0) return;

  const note = document.getElementById('entryNote').value.trim();
  const date = new Date(dateVal + 'T12:00:00');

  if (editingId) {
    const i = entries.findIndex(e => e.id === editingId);
    entries[i] = { ...entries[i], date, hours, note };
  } else {
    entries.push({ id: Date.now().toString(), date, hours, note });
  }
  save();
  closeModal('entryModal');
  renderRecords();
}

function deleteEntry() {
  if (!editingId) return;
  if (!confirm('Vymazať tento záznam?')) return;
  entries = entries.filter(e => e.id !== editingId);
  save();
  closeModal('entryModal');
  renderRecords();
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
let exportGroup = null;

function openExport(monthLabel) {
  exportGroup = groupByMonth(entries).find(g => g.label === monthLabel);
  if (!exportGroup) return;
  const total = exportGroup.items.reduce((s,e) => s+e.hours, 0);
  document.getElementById('exportTitle').textContent = monthLabel;

  const sorted = [...exportGroup.items].sort((a,b) => new Date(a.date)-new Date(b.date));
  let preview = `<div class="card" style="margin-bottom:16px">`;
  preview += `<div class="month-row"><div class="month-info"><div class="month-name">Celkom hodín</div><div class="month-days">${sorted.length} ${sorted.length===1?'deň':sorted.length<5?'dni':'dní'}</div></div><div class="month-hours">${fmtHours(total)}</div></div>`;
  sorted.forEach(e => {
    preview += `<div class="month-row"><div class="month-info"><div class="month-name">${fmtDate(e.date)}</div>${e.note?`<div class="month-days">${e.note}</div>`:''}</div><div class="month-hours">${fmtHours(e.hours)}</div></div>`;
  });
  preview += `</div>`;

  preview += `
    <button class="export-row" onclick="exportCSV()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Exportovať ako CSV
    </button>
    <button class="export-row" onclick="exportText()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Zdieľať ako text
    </button>`;

  document.getElementById('exportContent').innerHTML = preview;
  openModal('exportModal');
}

function exportCSV() {
  if (!exportGroup) return;
  const sorted = [...exportGroup.items].sort((a,b) => new Date(a.date)-new Date(b.date));
  let csv = 'Dátum,Hodiny,Minúty,Poznámka\n';
  sorted.forEach(e => {
    const h = Math.floor(e.hours);
    const m = Math.round((e.hours - h) * 60);
    csv += `"${fmtDate(e.date)}",${h},${m},"${(e.note||'').replace(/"/g,'""')}"\n`;
  });
  const total = sorted.reduce((s,e) => s+e.hours, 0);
  csv += `\nCelkom,${total.toFixed(2)},,\n`;

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dochadzka_${exportGroup.label.replace(/ /g,'_')}.csv`;
  a.click();
}

function exportText() {
  if (!exportGroup) return;
  const sorted = [...exportGroup.items].sort((a,b) => new Date(a.date)-new Date(b.date));
  const total = sorted.reduce((s,e) => s+e.hours, 0);
  let text = `📋 Dochádzka – ${exportGroup.label}\n`;
  text += '─'.repeat(30) + '\n';
  sorted.forEach(e => {
    text += `${fmtDate(e.date)}  ${fmtHours(e.hours)}`;
    if (e.note) text += `  (${e.note})`;
    text += '\n';
  });
  text += '─'.repeat(30) + '\n';
  text += `CELKOM: ${fmtHours(total)}\n`;

  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Skopírované do schránky!'));
  }
}

// ─── MODAL HELPERS ───────────────────────────────────────────────────────────
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) closeModal(el.id);
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderRecords();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
